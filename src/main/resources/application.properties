# Smart Assembly Application Properties
# ? ??? ??????? ?????????? ?????????? ????????? ??? ???????? ?? ?????????

spring.application.name=smart-assembly

app.frontend.url=${FRONTEND_URL:http://localhost:50587}
# ???????????????????????????????????????????????????????????????????????????????
# DATABASE CONFIGURATION
# ???????????????????????????????????????????????????????????????????????????????
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_assembly}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ???????????????????????????????????????????????????????????????????????????????
# JPA / HIBERNATE CONFIGURATION
# ???????????????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ? ????????? open-in-view ??? ?????????????? N+1 ????????
spring.jpa.open-in-view=false

# ??????????? Hibernate
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_sql_comments=false

# ???????????????????????????????????????????????????????????????????????????????
# SECURITY & JWT
# ???????????????????????????????????????????????????????????????????????????????
# ? ?? ???????????? ??????????? ???????????? Spring Security
# spring.security.user.name ? spring.security.user.password ?? ??????!

# JWT ?????
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# ???????????????????????????????????????????????????????????????????????????????
# SERVER CONFIGURATION
# ???????????????????????????????????????????????????????????????????????????????
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# ???????????????????????????????????????????????????????????????????????????????
# GOOGLE SHEETS INTEGRATION
# ???????????????????????????????????????????????????????????????????????????????
google.sheets.credentials-path=classpath:service-account.json
google.sheets.spreadsheet-id=${GOOGLE_SHEETS_ID:}
google.sheets.range=1479903952!A2:Q
google.sheets.default-assembly-id=1

# ???????????????????????????????????????????????????????????????????????????????
# SMS PROVIDER (Mobizon.kz)
# ???????????????????????????????????????????????????????????????????????????????
mobizon.enabled=${MOBIZON_ENABLED:true}
mobizon.api-key=${MOBIZON_API_KEY:}

# ???????????????????????????????????????????????????????????????????????????????
# LOGGING
# ???????????????????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.smartassembly.backend=INFO
logging.level.com.smartassembly.backend.security=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.sql=WARN

# ===============================================================================
# FLYWAY
# ===============================================================================
# baseline-on-migrate=true — безопасно для уже существующей БД на smart-assembly.org
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# ===============================================================================
# SWAGGER / OPENAPI
# ===============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.info.title=Smart Assembly API
springdoc.info.version=1.0.0